<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Spring AI Chat</title>
    <style>
        :root {
            color-scheme: light;
            --bg: #eceff3;
            --panel: #ffffff;
            --panel-soft: #f6f7f9;
            --sidebar: #171717;
            --sidebar-soft: #212121;
            --sidebar-text: #f5f5f5;
            --text: #1f2937;
            --muted: #667085;
            --line: #d8dde6;
            --accent: #10a37f;
            --accent-strong: #0b8a6a;
            --danger: #c4320a;
            --danger-soft: #fef3f2;
            --warning-bg: #fff8db;
            --warning-line: #e7c76f;
            --radius: 8px;
            --shadow: 0 12px 30px rgba(15, 23, 42, 0.08);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Arial, "Microsoft YaHei", sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        button,
        select,
        textarea,
        input {
            font: inherit;
        }

        .app {
            min-height: 100vh;
            display: grid;
            grid-template-columns: 312px minmax(0, 1fr);
        }

        .sidebar {
            display: grid;
            grid-template-rows: auto auto auto auto minmax(0, 1fr) auto;
            gap: 16px;
            padding: 16px;
            background: var(--sidebar);
            color: var(--sidebar-text);
        }

        .brand {
            display: flex;
            align-items: center;
            gap: 12px;
            min-height: 44px;
            font-size: 16px;
            font-weight: 700;
        }

        .brand-mark {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            display: grid;
            place-items: center;
            background: var(--accent);
            color: white;
            font-weight: 800;
        }

        .sidebar-btn {
            min-height: 40px;
            border: 1px solid #383838;
            border-radius: var(--radius);
            background: transparent;
            color: var(--sidebar-text);
            cursor: pointer;
            text-align: left;
            padding: 0 12px;
        }

        .sidebar-btn:hover {
            background: #242424;
        }

        .control-panel,
        .rag-panel {
            display: grid;
            gap: 12px;
            padding: 14px;
            border-radius: var(--radius);
            background: var(--sidebar-soft);
        }

        .control-group {
            display: grid;
            gap: 8px;
        }

        .rag-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }

        .rag-note {
            color: #9ca3af;
            font-size: 12px;
            line-height: 1.5;
        }

        label {
            font-size: 12px;
            color: #bdbdbd;
        }

        select {
            width: 100%;
            min-height: 38px;
            border: 1px solid #3f3f46;
            border-radius: var(--radius);
            background: #111827;
            color: var(--sidebar-text);
            padding: 0 10px;
            outline: none;
        }

        .conversation-list {
            overflow-y: auto;
            display: grid;
            gap: 8px;
            align-content: start;
        }

        .conversation-item {
            display: grid;
            gap: 6px;
            width: 100%;
            padding: 12px;
            border: 1px solid #313131;
            border-radius: var(--radius);
            background: transparent;
            color: var(--sidebar-text);
            cursor: pointer;
            text-align: left;
        }

        .conversation-item:hover {
            background: #252525;
        }

        .conversation-item.active {
            border-color: #4b5563;
            background: #2b2b2b;
        }

        .conversation-item strong {
            font-size: 14px;
            font-weight: 600;
            line-height: 1.4;
        }

        .conversation-meta {
            color: #9ca3af;
            font-size: 12px;
        }

        .sidebar-status {
            padding-top: 12px;
            border-top: 1px solid #313131;
            color: #bdbdbd;
            font-size: 13px;
            line-height: 1.5;
        }

        .main {
            min-width: 0;
            display: grid;
            grid-template-rows: auto minmax(0, 1fr) auto;
            min-height: 100vh;
        }

        .topbar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            min-height: 64px;
            padding: 0 24px;
            border-bottom: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(14px);
        }

        .title {
            min-width: 0;
        }

        .title strong,
        .title span {
            display: block;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .title strong {
            font-size: 16px;
        }

        .title span {
            margin-top: 4px;
            color: var(--muted);
            font-size: 13px;
        }

        .topbar-actions {
            display: flex;
            gap: 10px;
        }

        .secondary-btn {
            min-height: 36px;
            padding: 0 12px;
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: var(--panel);
            color: var(--text);
            cursor: pointer;
        }

        .secondary-btn:hover {
            background: var(--panel-soft);
        }

        .danger-btn {
            border-color: #f0c4b7;
            color: var(--danger);
            background: #fffaf9;
        }

        .danger-btn:hover {
            background: var(--danger-soft);
        }

        .chat-scroll {
            overflow-y: auto;
            padding: 28px 18px 132px;
        }

        .messages {
            max-width: 900px;
            margin: 0 auto;
            display: grid;
            gap: 22px;
        }

        .welcome,
        .notice {
            border: 1px solid var(--line);
            border-radius: var(--radius);
            background: var(--panel);
            padding: 18px;
            line-height: 1.6;
        }

        .welcome strong {
            display: block;
            margin-bottom: 6px;
        }

        .notice {
            color: #7a4a00;
            background: var(--warning-bg);
            border-color: var(--warning-line);
        }

        .message-row {
            display: grid;
            grid-template-columns: 38px minmax(0, 1fr);
            gap: 14px;
            align-items: start;
        }

        .avatar {
            width: 38px;
            height: 38px;
            border-radius: 10px;
            display: grid;
            place-items: center;
            font-size: 13px;
            font-weight: 700;
            color: white;
            background: #94a3b8;
        }

        .message-row.user .avatar {
            background: #7c5cfa;
        }

        .message-row.assistant .avatar {
            background: var(--accent);
        }

        .message-row.error .avatar {
            background: var(--danger);
        }

        .bubble {
            min-height: 38px;
            padding: 2px 0;
            line-height: 1.75;
            word-break: break-word;
            font-size: 15px;
        }

        .message-row.error .bubble {
            color: var(--danger);
        }

        .bubble p {
            margin: 0 0 12px;
        }

        .bubble p:last-child,
        .bubble ul:last-child,
        .bubble ol:last-child,
        .bubble pre:last-child,
        .bubble blockquote:last-child {
            margin-bottom: 0;
        }

        .bubble h1,
        .bubble h2,
        .bubble h3,
        .bubble h4 {
            margin: 0 0 12px;
            line-height: 1.35;
        }

        .bubble ul,
        .bubble ol {
            margin: 0 0 12px 20px;
            padding: 0;
        }

        .bubble li {
            margin: 4px 0;
        }

        .bubble code {
            padding: 2px 6px;
            border-radius: 6px;
            background: #eef2f6;
            font-family: "Cascadia Code", "Consolas", monospace;
            font-size: 0.92em;
        }

        .bubble pre {
            margin: 0 0 12px;
            padding: 14px;
            overflow-x: auto;
            white-space: pre;
            border: 1px solid #d8e0ea;
            border-radius: 8px;
            background: #f8fafc;
            font-family: "Cascadia Code", "Consolas", monospace;
            font-size: 13px;
            line-height: 1.6;
        }

        .bubble pre code {
            padding: 0;
            background: transparent;
        }

        .bubble blockquote {
            margin: 0 0 12px;
            padding: 0 0 0 12px;
            border-left: 3px solid #c6d6d1;
            color: #56605b;
        }

        .composer-wrap {
            position: fixed;
            left: 312px;
            right: 0;
            bottom: 0;
            padding: 18px;
            background: linear-gradient(180deg, rgba(236, 239, 243, 0), var(--bg) 30%);
        }

        .composer {
            max-width: 900px;
            margin: 0 auto;
            display: grid;
            grid-template-columns: minmax(0, 1fr) 44px;
            gap: 12px;
            align-items: end;
            padding: 12px;
            border: 1px solid var(--line);
            border-radius: 16px;
            background: var(--panel);
            box-shadow: var(--shadow);
        }

        textarea {
            width: 100%;
            min-height: 52px;
            max-height: 180px;
            border: none;
            resize: none;
            outline: none;
            padding: 12px;
            line-height: 1.55;
            color: var(--text);
            background: transparent;
        }

        .send-btn {
            width: 44px;
            height: 44px;
            border: none;
            border-radius: 12px;
            background: var(--accent);
            color: white;
            cursor: pointer;
            font-size: 18px;
        }

        .send-btn:hover {
            background: var(--accent-strong);
        }

        .send-btn:disabled,
        .secondary-btn:disabled,
        .sidebar-btn:disabled,
        select:disabled {
            cursor: not-allowed;
            opacity: 0.6;
        }

        @media (max-width: 860px) {
            .app {
                grid-template-columns: 1fr;
            }

            .sidebar {
                grid-template-rows: auto auto auto auto auto;
            }

            .conversation-list {
                max-height: 220px;
            }

            .composer-wrap {
                left: 0;
                padding: 12px;
            }

            .topbar {
                padding: 0 14px;
            }

            .chat-scroll {
                padding: 20px 12px 118px;
            }
        }
    </style>
</head>
<body>
<div class="app">
    <aside class="sidebar">
        <div class="brand">
            <div class="brand-mark">AI</div>
            <div>Spring AI Chat</div>
        </div>

        <button class="sidebar-btn" id="newChatBtn" type="button">+ 新建对话</button>

        <div class="control-panel">
            <div class="control-group">
                <label for="platform">平台</label>
                <select id="platform">
                    <option value="aliyun">阿里云</option>
                    <option value="deepseek">DeepSeek</option>
                </select>
            </div>

            <div class="control-group">
                <label for="modelType">模型</label>
                <select id="modelType"></select>
            </div>
        </div>

        <div class="rag-panel">
            <div class="control-group">
                <label for="ragFileInput">知识库</label>
                <input id="ragFileInput" type="file" accept=".md,.markdown,text/markdown" multiple hidden>
                <div class="rag-actions">
                    <button class="sidebar-btn" id="ragImportBtn" type="button">导入 Markdown</button>
                    <button class="sidebar-btn" id="ragClearBtn" type="button">清空知识库</button>
                </div>
                <div class="rag-note" id="ragStatusText">知识库切片数: 0</div>
            </div>
        </div>

        <div class="conversation-list" id="conversationList"></div>

        <div class="sidebar-status" id="statusText">就绪</div>
    </aside>

    <main class="main">
        <header class="topbar">
            <div class="title">
                <strong id="chatTitle">新对话</strong>
                <span id="apiText">/v1/chat/completions/stream</span>
            </div>
            <div class="topbar-actions">
                <button class="secondary-btn" id="refreshBtn" type="button">刷新历史</button>
                <button class="secondary-btn danger-btn" id="deleteBtn" type="button">删除会话</button>
            </div>
        </header>

        <section class="chat-scroll" id="chatScroll">
            <div class="messages" id="messages">
                <div class="welcome" id="welcomeCard">
                    <strong>开始一段对话</strong>
                    <span>左侧保留平台、模型、知识库和历史会话。导入 Markdown 后，聊天会先检索知识库，再结合大模型生成回答。</span>
                </div>
                <div id="fileNotice" class="notice" hidden>
                    当前页面是从本地文件打开的，接口会请求到 http://localhost:8080。请确认 Spring Boot 服务已经启动。
                </div>
            </div>
        </section>

        <div class="composer-wrap">
            <div class="composer">
                <textarea id="message" rows="1" placeholder="输入消息，按 Enter 发送，Shift + Enter 换行">请结合知识库解释一下 Spring Boot 自动配置。</textarea>
                <button class="send-btn" id="sendBtn" type="button" title="发送">↑</button>
            </div>
        </div>
    </main>
</div>

<script>
    const sendBtn = document.getElementById("sendBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const deleteBtn = document.getElementById("deleteBtn");
    const newChatBtn = document.getElementById("newChatBtn");
    const ragImportBtn = document.getElementById("ragImportBtn");
    const ragClearBtn = document.getElementById("ragClearBtn");
    const ragFileInput = document.getElementById("ragFileInput");
    const ragStatusText = document.getElementById("ragStatusText");
    const messages = document.getElementById("messages");
    const chatScroll = document.getElementById("chatScroll");
    const messageInput = document.getElementById("message");
    const fileNotice = document.getElementById("fileNotice");
    const welcomeCard = document.getElementById("welcomeCard");
    const platformSelect = document.getElementById("platform");
    const modelTypeSelect = document.getElementById("modelType");
    const statusText = document.getElementById("statusText");
    const chatTitle = document.getElementById("chatTitle");
    const apiText = document.getElementById("apiText");
    const conversationList = document.getElementById("conversationList");
    const baseUrl = window.location.protocol === "file:" ? "http://localhost:8080" : "";
    const streamApiUrl = baseUrl + "/v1/chat/completions/stream";
    const conversationsApiUrl = baseUrl + "/api/conversations";
    const ragStatusApiUrl = baseUrl + "/api/rag/status";
    const ragImportApiUrl = baseUrl + "/api/rag/documents/import";
    const ragClearApiUrl = baseUrl + "/api/rag/documents";
    const modelTypes = {
        aliyun: [
            {value: "chat", label: "glm-5.1"},
            {value: "plus", label: "deepseek-v4-flash"},
            {value: "max", label: "qwen3.7-max"}
        ],
        deepseek: [
            {value: "chat", label: "deepseek-chat"},
            {value: "reasoner", label: "deepseek-reasoner"}
        ]
    };

    let currentConversationId = null;
    let isBusy = false;

    if (window.location.protocol === "file:") {
        fileNotice.hidden = false;
    }

    apiText.textContent = streamApiUrl;

    function formatTime(isoText) {
        if (!isoText) {
            return "";
        }
        const date = new Date(isoText);
        if (Number.isNaN(date.getTime())) {
            return isoText;
        }
        return date.toLocaleString("zh-CN", {
            month: "2-digit",
            day: "2-digit",
            hour: "2-digit",
            minute: "2-digit"
        });
    }

    function escapeHtml(text) {
        return text
            .replace(/&/g, "&amp;")
            .replace(/</g, "&lt;")
            .replace(/>/g, "&gt;")
            .replace(/"/g, "&quot;")
            .replace(/'/g, "&#39;");
    }

    function looksLikeJson(text) {
        const value = text.trim();
        return (value.startsWith("{") && value.endsWith("}"))
            || (value.startsWith("[") && value.endsWith("]"));
    }

    function renderInline(text) {
        return escapeHtml(text)
            .replace(/`([^`]+)`/g, "<code>$1</code>")
            .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
            .replace(/\*([^*\n]+)\*/g, "<em>$1</em>");
    }

    function renderMarkdown(text) {
        let html = escapeHtml(text);
        html = html.replace(/```([\w-]*)\n([\s\S]*?)```/g, function (_, lang, code) {
            const language = lang ? " data-lang=\"" + lang + "\"" : "";
            return "<pre><code" + language + ">" + code.trimEnd() + "</code></pre>";
        });

        const blocks = html.split(/\n\s*\n/).filter(function (block) {
            return block.trim() !== "";
        });

        return blocks.map(function (block) {
            const lines = block.split("\n");

            if (block.startsWith("<pre><code")) {
                return block;
            }

            if (lines.every(function (line) { return /^>\s?/.test(line); })) {
                return "<blockquote>" + lines.map(function (line) {
                    return renderInline(line.replace(/^>\s?/, ""));
                }).join("<br>") + "</blockquote>";
            }

            if (lines.every(function (line) { return /^[-*]\s+/.test(line); })) {
                return "<ul>" + lines.map(function (line) {
                    return "<li>" + renderInline(line.replace(/^[-*]\s+/, "")) + "</li>";
                }).join("") + "</ul>";
            }

            if (lines.every(function (line) { return /^\d+\.\s+/.test(line); })) {
                return "<ol>" + lines.map(function (line) {
                    return "<li>" + renderInline(line.replace(/^\d+\.\s+/, "")) + "</li>";
                }).join("") + "</ol>";
            }

            if (/^###\s+/.test(block)) {
                return "<h3>" + renderInline(block.replace(/^###\s+/, "")) + "</h3>";
            }
            if (/^##\s+/.test(block)) {
                return "<h2>" + renderInline(block.replace(/^##\s+/, "")) + "</h2>";
            }
            if (/^#\s+/.test(block)) {
                return "<h1>" + renderInline(block.replace(/^#\s+/, "")) + "</h1>";
            }

            return "<p>" + lines.map(function (line) {
                return renderInline(line);
            }).join("<br>") + "</p>";
        }).join("");
    }

    function renderAssistantBubble(bubble, text) {
        const raw = text || "";
        bubble.dataset.raw = raw;
        const trimmed = raw.trim();
        if (!trimmed) {
            bubble.textContent = "";
            return;
        }

        if (looksLikeJson(trimmed)) {
            try {
                const parsed = JSON.parse(trimmed);
                bubble.innerHTML = "<pre><code>" + escapeHtml(JSON.stringify(parsed, null, 2)) + "</code></pre>";
                return;
            } catch (error) {
                // Continue to markdown rendering.
            }
        }

        bubble.innerHTML = renderMarkdown(raw);
    }

    function scrollToBottom() {
        chatScroll.scrollTop = chatScroll.scrollHeight;
    }

    function hideWelcome() {
        if (welcomeCard) {
            welcomeCard.hidden = true;
        }
    }

    function clearMessages() {
        Array.from(messages.querySelectorAll(".message-row")).forEach(function (node) {
            node.remove();
        });
        if (welcomeCard) {
            welcomeCard.hidden = false;
        }
    }

    function appendMessage(role, text) {
        hideWelcome();

        const row = document.createElement("div");
        row.className = "message-row " + role;

        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.textContent = role === "user" ? "我" : role === "error" ? "!" : "AI";

        const bubble = document.createElement("div");
        bubble.className = "bubble";
        bubble.dataset.raw = text || "";
        if (role === "assistant") {
            renderAssistantBubble(bubble, bubble.dataset.raw);
        } else {
            bubble.textContent = text || "";
        }

        row.appendChild(avatar);
        row.appendChild(bubble);
        messages.appendChild(row);
        scrollToBottom();
        return bubble;
    }

    function getSelectedModelLabel() {
        const selected = modelTypeSelect.options[modelTypeSelect.selectedIndex];
        return selected ? selected.textContent : "";
    }

    function updateHeaderTitle(title) {
        const platformText = platformSelect.options[platformSelect.selectedIndex]
            ? platformSelect.options[platformSelect.selectedIndex].textContent
            : "";
        const modelLabel = getSelectedModelLabel();
        chatTitle.textContent = title || (platformText + " · " + modelLabel);
    }

    function refreshModelTypes() {
        const options = modelTypes[platformSelect.value] || [];
        const currentValue = modelTypeSelect.value;
        modelTypeSelect.innerHTML = "";
        options.forEach(function (item) {
            const option = document.createElement("option");
            option.value = item.value;
            option.textContent = item.label;
            modelTypeSelect.appendChild(option);
        });
        if (options.some(function (item) { return item.value === currentValue; })) {
            modelTypeSelect.value = currentValue;
        }
        updateHeaderTitle(currentConversationId ? chatTitle.textContent : "");
    }

    function setBusy(busy) {
        isBusy = busy;
        sendBtn.disabled = busy;
        refreshBtn.disabled = busy;
        newChatBtn.disabled = busy;
        ragImportBtn.disabled = busy;
        ragClearBtn.disabled = busy;
        deleteBtn.disabled = busy || !currentConversationId;
        platformSelect.disabled = busy;
        modelTypeSelect.disabled = busy;
        statusText.textContent = busy ? "请求中..." : "就绪";
    }

    function resetComposerHeight() {
        messageInput.style.height = "auto";
        messageInput.style.height = Math.min(messageInput.scrollHeight, 180) + "px";
    }

    function createConversationItem(conversation) {
        const button = document.createElement("button");
        button.type = "button";
        button.className = "conversation-item" + (conversation.id === currentConversationId ? " active" : "");
        button.dataset.id = conversation.id;
        button.innerHTML = [
            "<strong>" + escapeHtml(conversation.title || "新对话") + "</strong>",
            "<div class=\"conversation-meta\">" + escapeHtml((conversation.platform || "") + " · " + (conversation.modelType || "")) + "</div>",
            "<div class=\"conversation-meta\">" + escapeHtml(formatTime(conversation.updatedAt)) + "</div>"
        ].join("");
        button.addEventListener("click", function () {
            if (isBusy || conversation.id === currentConversationId) {
                return;
            }
            loadConversation(conversation.id);
        });
        return button;
    }

    async function refreshConversationList() {
        const response = await fetch(conversationsApiUrl);
        if (!response.ok) {
            throw new Error("历史记录加载失败，状态码：" + response.status);
        }
        const data = await response.json();
        conversationList.innerHTML = "";
        if (!Array.isArray(data) || data.length === 0) {
            const empty = document.createElement("div");
            empty.className = "conversation-meta";
            empty.textContent = "还没有历史会话";
            conversationList.appendChild(empty);
            return;
        }
        data.forEach(function (item) {
            conversationList.appendChild(createConversationItem(item));
        });
    }

    async function refreshRagStatus() {
        const response = await fetch(ragStatusApiUrl);
        if (!response.ok) {
            throw new Error("知识库状态获取失败，状态码：" + response.status);
        }
        const data = await response.json();
        ragStatusText.textContent = "知识库切片数: " + (data.totalChunks || 0);
    }

    async function loadConversation(conversationId) {
        setBusy(true);
        try {
            const response = await fetch(conversationsApiUrl + "/" + encodeURIComponent(conversationId));
            if (!response.ok) {
                throw new Error("会话详情加载失败，状态码：" + response.status);
            }
            const data = await response.json();
            currentConversationId = data.id;
            platformSelect.value = data.platform || "aliyun";
            refreshModelTypes();
            if (data.modelType) {
                modelTypeSelect.value = data.modelType;
            }
            clearMessages();
            (data.messages || []).forEach(function (item) {
                appendMessage(item.role === "assistant" ? "assistant" : item.role === "user" ? "user" : "error", item.content || "");
            });
            updateHeaderTitle(data.title || "新对话");
            await refreshConversationList();
        } catch (error) {
            appendMessage("error", error.message);
        } finally {
            setBusy(false);
            scrollToBottom();
        }
    }

    function startNewConversation() {
        currentConversationId = null;
        clearMessages();
        updateHeaderTitle("");
        refreshConversationList().catch(function () {
            statusText.textContent = "历史刷新失败";
        });
        deleteBtn.disabled = true;
        messageInput.focus();
    }

    async function deleteConversation() {
        if (!currentConversationId) {
            return;
        }
        const confirmed = window.confirm("确认删除当前会话吗？");
        if (!confirmed) {
            return;
        }
        setBusy(true);
        try {
            const response = await fetch(conversationsApiUrl + "/" + encodeURIComponent(currentConversationId), {
                method: "DELETE"
            });
            if (!response.ok) {
                throw new Error("删除失败，状态码：" + response.status);
            }
            startNewConversation();
        } catch (error) {
            appendMessage("error", error.message);
        } finally {
            setBusy(false);
        }
    }

    async function importMarkdownFiles() {
        const files = Array.from(ragFileInput.files || []);
        if (files.length === 0) {
            return;
        }
        setBusy(true);
        try {
            const formData = new FormData();
            files.forEach(function (file) {
                formData.append("files", file);
            });
            const response = await fetch(ragImportApiUrl, {
                method: "POST",
                body: formData
            });
            if (!response.ok) {
                const text = await response.text();
                throw new Error("Markdown 导入失败，状态码：" + response.status + "\n" + text);
            }
            const result = await response.json();
            ragStatusText.textContent = "已导入 " + result.importedFiles + " 个文件，新增 " + result.importedChunks + " 个切片";
            appendMessage("assistant", "知识库导入完成，可直接开始提问。\n\n导入文件：\n- " + (result.sourceNames || []).join("\n- "));
            await refreshRagStatus();
        } catch (error) {
            appendMessage("error", error.message);
        } finally {
            ragFileInput.value = "";
            setBusy(false);
        }
    }

    async function clearRagStore() {
        const confirmed = window.confirm("确认清空当前知识库吗？");
        if (!confirmed) {
            return;
        }
        setBusy(true);
        try {
            const response = await fetch(ragClearApiUrl, {
                method: "DELETE"
            });
            if (!response.ok) {
                throw new Error("清空知识库失败，状态码：" + response.status);
            }
            ragStatusText.textContent = "知识库已清空";
        } catch (error) {
            appendMessage("error", error.message);
        } finally {
            setBusy(false);
            refreshRagStatus().catch(function () {
                ragStatusText.textContent = "知识库状态刷新失败";
            });
        }
    }

    async function sendMessage() {
        const content = messageInput.value.trim();
        if (!content) {
            return;
        }

        appendMessage("user", content);
        messageInput.value = "";
        resetComposerHeight();
        setBusy(true);
        const assistantBubble = appendMessage("assistant", "");

        try {
            const response = await fetch(streamApiUrl, {
                method: "POST",
                headers: {
                    "Content-Type": "application/json",
                    "Accept": "text/event-stream"
                },
                body: JSON.stringify({
                    conversationId: currentConversationId,
                    platform: platformSelect.value,
                    modelType: modelTypeSelect.value,
                    messages: [
                        {
                            role: "user",
                            content: content
                        }
                    ]
                })
            });

            if (!response.ok || !response.body) {
                throw new Error("请求失败，状态码：" + response.status);
            }

            const reader = response.body.getReader();
            const decoder = new TextDecoder("utf-8");
            let buffer = "";

            while (true) {
                const result = await reader.read();
                if (result.done) {
                    break;
                }

                buffer += decoder.decode(result.value, {stream: true});
                const parts = buffer.split("\n\n");
                buffer = parts.pop() || "";

                parts.forEach(function (part) {
                    const line = part.trim();
                    if (!line.startsWith("data:")) {
                        return;
                    }

                    const data = line.substring(5).trim();
                    if (data === "[DONE]") {
                        return;
                    }

                    try {
                        const json = JSON.parse(data);
                        if (json.conversationId && !currentConversationId) {
                            currentConversationId = json.conversationId;
                        }
                        if (json.error) {
                            assistantBubble.parentElement.remove();
                            appendMessage("error", json.error.message || JSON.stringify(json.error));
                            return;
                        }
                        const choices = json.choices || [];
                        const delta = choices[0] ? (choices[0].delta || {}) : {};
                        if (delta.content) {
                            assistantBubble.dataset.raw = (assistantBubble.dataset.raw || "") + delta.content;
                            renderAssistantBubble(assistantBubble, assistantBubble.dataset.raw);
                            scrollToBottom();
                        }
                    } catch (error) {
                        assistantBubble.dataset.raw = (assistantBubble.dataset.raw || "") + "\n[解析失败] " + data;
                        renderAssistantBubble(assistantBubble, assistantBubble.dataset.raw);
                    }
                });
            }

            if (!(assistantBubble.dataset.raw || "").trim()) {
                assistantBubble.textContent = "没有收到内容。";
            }

            if (currentConversationId) {
                const detailResponse = await fetch(conversationsApiUrl + "/" + encodeURIComponent(currentConversationId));
                if (detailResponse.ok) {
                    const detail = await detailResponse.json();
                    updateHeaderTitle(detail.title || "新对话");
                }
            }
            await refreshConversationList();
        } catch (error) {
            assistantBubble.parentElement.remove();
            appendMessage("error", error.message + "\n请确认 Spring Boot 已启动，并且对应平台的 API Key 已配置。");
        } finally {
            setBusy(false);
            messageInput.focus();
        }
    }

    platformSelect.addEventListener("change", function () {
        refreshModelTypes();
        if (!currentConversationId) {
            updateHeaderTitle("");
        }
    });
    modelTypeSelect.addEventListener("change", function () {
        if (!currentConversationId) {
            updateHeaderTitle("");
        }
    });
    messageInput.addEventListener("input", resetComposerHeight);
    messageInput.addEventListener("keydown", function (event) {
        if (event.key === "Enter" && !event.shiftKey) {
            event.preventDefault();
            sendMessage();
        }
    });
    sendBtn.addEventListener("click", sendMessage);
    refreshBtn.addEventListener("click", function () {
        refreshConversationList().catch(function (error) {
            appendMessage("error", error.message);
        });
    });
    newChatBtn.addEventListener("click", startNewConversation);
    deleteBtn.addEventListener("click", deleteConversation);
    ragImportBtn.addEventListener("click", function () {
        ragFileInput.click();
    });
    ragFileInput.addEventListener("change", importMarkdownFiles);
    ragClearBtn.addEventListener("click", clearRagStore);

    refreshModelTypes();
    resetComposerHeight();
    updateHeaderTitle("");
    refreshRagStatus().catch(function (error) {
        ragStatusText.textContent = error.message;
    });
    refreshConversationList().catch(function (error) {
        statusText.textContent = error.message;
    });
</script>
</body>
</html>
