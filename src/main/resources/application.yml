server:
  port: 8080
logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS,Asia/Shanghai} [%thread] %-5level %file:%line - %msg%n"
spring:
  application:
    name: springaid
  ai:
    openai:
      # Alibaba Cloud DashScope is OpenAI-compatible; Spring AI still uses the openai starter.
      base-url: https://dashscope.aliyuncs.com/compatible-mode
      api-key: ${ALIYUN_API_KEY:${DASHSCOPE_API_KEY:}}
      chat:
        options:
          model: qwen3.7-max
          temperature: 0.8

app:
  ai:
    default-platform: aliyun
    providers:
      aliyun:
        base-url: https://dashscope.aliyuncs.com/compatible-mode
        api-key: ${ALIYUN_API_KEY:${DASHSCOPE_API_KEY:}}
        default-model-type: chat
        temperature: 0.8
        models:
          chat: glm-5.1
          plus: deepseek-v4-flash
          max: qwen3.7-max
      deepseek:
        base-url: https://api.deepseek.com
        api-key: ${DEEPSEEK_API_KEY:${deepApi:}}
        default-model-type: chat
        temperature: 0.8
        models:
          chat: deepseek-chat
          reasoner: deepseek-reasoner
  rag:
    enabled: true
    embedding-model: text-embedding-v4
    top-k: 4
    min-score: 0.45
    chunk-size: 800
    chunk-overlap: 120
    store-file: data/rag-store.json
